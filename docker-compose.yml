services:

  mysql:
    image: mysql:8.0
    container_name: banking-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Sai@2005
      MYSQL_DATABASE: banking_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pSai@2005"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server

    ports:
      - "8761:8761"

    depends_on:
      mysql:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: user-service

    ports:
      - "8081:8081"

    depends_on:
      mysql:
        condition: service_healthy

      eureka-server:
        condition: service_started

  account-service:
    build: ./account-service
    container_name: account-service

    ports:
      - "8082:8082"

    depends_on:
      mysql:
        condition: service_healthy

      eureka-server:
        condition: service_started

  transaction-service:
    build: ./transaction-service
    container_name: transaction-service

    ports:
      - "8083:8083"

    depends_on:
      mysql:
        condition: service_healthy

      eureka-server:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway

    ports:
      - "8080:8080"

    depends_on:
      user-service:
        condition: service_started

      account-service:
        condition: service_started

      transaction-service:
        condition: service_started

      eureka-server:
        condition: service_started

volumes:
  mysql-data: