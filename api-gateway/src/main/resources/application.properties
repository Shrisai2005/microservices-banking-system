server.port=8080

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=*

# USER SERVICE
spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

# ACCOUNT SERVICE
spring.cloud.gateway.server.webmvc.routes[1].id=account-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/accounts/**

# TRANSACTION SERVICE
spring.cloud.gateway.server.webmvc.routes[2].id=transaction-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/transactions/**